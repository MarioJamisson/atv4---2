<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>~* Galeria da Letícia *~</title>
    <style>
        /* ............................................................
           1. VARIÁVEIS E CONFIGURAÇÕES GLOBAIS
           ............................................................ */
        :root {
            --pink-light: #ffb6c1;
            --pink-hot: #ff1493;
            --pink-mid: #ff69b4;
            --pink-dark: #d10069;
            --bg-window: #fff0f5;
        }

        body { 
            background-color: var(--pink-light); 
            background-image: radial-gradient(var(--pink-mid) 2px, transparent 2px); 
            background-size: 30px 30px; 
            color: var(--pink-dark); 
            font-family: "Comic Sans MS", "Chalkboard SE", cursive; 
            padding: 1.25rem;
            display: flex;
            justify-content: center;
            margin: 0;
            cursor: url('https://cdn.cursors-4u.net/previews/star-f80bf935-32.webp') 32 32, auto; 
        }

        /* ............................................................
           2. ESTILO DA JANELA (WINDOW CONTAINER)
           ............................................................ */
        .window-container {
            background-color: var(--bg-window); 
            border: 4px dashed var(--pink-hot); 
            border-radius: 15px; 
            padding: 1.25rem; 
            box-shadow: 12px 12px 0px rgba(255, 105, 180, 0.4); 
            max-width: 50rem; 
            width: 100%;
            box-sizing: border-box;
        }

        .window-title-bar {
            background: linear-gradient(90deg, var(--pink-hot), var(--pink-light)); 
            color: white;
            padding: 0.5rem 0.93rem; 
            font-weight: bold;
            font-size: 1.2rem; 
            border-radius: 10px 10px 0 0;
            margin: -1.25rem -1.25rem 1.25rem -1.25rem; 
            display: flex;
            justify-content: space-between;
            border-bottom: 3px solid var(--pink-mid);
            text-shadow: 1px 1px 2px var(--pink-dark);
        }

        /* ............................................................
           3. CABEÇALHO E ELEMENTOS DECORATIVOS
           ............................................................ */
        header { text-align: center; margin-bottom: 1.25rem; }

        marquee {
            font-size: 1.2rem;
            color: var(--pink-hot);
            font-weight: bold;
            background: #fff;
            border: 2px dotted var(--pink-mid);
            border-radius: 10px;
            padding: 0.31rem;
            margin-bottom: 0.93rem;
        }

        h1 { 
            font-family: "Arial Black", sans-serif;
            font-size: 2.2rem; 
            color: var(--pink-hot); 
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px var(--pink-mid); 
            margin: 0;
            letter-spacing: 2px;
        }

        /* ............................................................
           4. SEÇÃO DE CONTROLES (BUSCA E BOTÕES)
           ............................................................ */
        .controles { 
            margin-bottom: 1.25rem; 
            display: flex; 
            gap: 0.62rem; 
            flex-wrap: wrap; 
            justify-content: center;
            background: #fff;
            padding: 0.93rem;
            border: 2px dotted var(--pink-mid);
            border-radius: 10px;
        }

        input[type="text"] { 
            padding: 0.62rem 0.93rem; 
            flex-grow: 1; 
            border: 2px solid var(--pink-light);
            border-radius: 20px;
            font-family: "Comic Sans MS", cursive;
            font-size: 1rem;
            color: var(--pink-dark);
            background-color: #fffafa; 
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--pink-hot);
            box-shadow: 0 0 8px var(--pink-light);
        }

        button { 
            padding: 0.5rem 1rem; 
            cursor: pointer; 
            font-family: "Comic Sans MS", cursive;
            font-size: 0.9rem;
            background: var(--pink-mid);
            border: 2px solid var(--pink-hot);
            border-radius: 20px;
            font-weight: bold;
            color: #fff;
            box-shadow: 3px 3px 0px var(--pink-hot);
            transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
        }

        button:active {
            box-shadow: 0px 0px 0px var(--pink-hot);
            transform: translate(3px, 3px);
        }

        button:hover { background: var(--pink-hot); }

        /* ............................................................
           5. GRADE DA GALERIA E CARDS COM EFEITO HOVER/DESCRIÇÃO
           ............................................................ */
        #gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 0.93rem; 
            background: #fff;
            padding: 1.25rem;
            border: 3px double var(--pink-mid);
            border-radius: 10px;
            transition: opacity 0.3s ease-in-out; 
            min-height: 12.5rem;
        }

        .fade-out { opacity: 0; }

        /* O CONTAINER DA FOTO: Agora ele guarda a imagem e o texto */
        .img-card { 
            position: relative; /* Essencial para o texto ficar preso dentro dele */
            width: 100%; 
            height: 12.5rem; 
            border: 5px solid #fff; 
            border-radius: 8px;
            box-shadow: 4px 4px 10px rgba(255, 20, 147, 0.2); 
            overflow: hidden; /* Esconde o texto que está "para fora" antes do hover */
            cursor: pointer;
            transition: transform 0.2s;
            animation: fadeIn 0.6s ease-out forwards;
        }

        /* Movimento do container inteiro ao passar o mouse */
        .img-card:hover { 
            transform: scale(1.05) rotate(-2deg); 
            z-index: 1; 
        }

        /* A IMAGEM EM SI */
        .img-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease; /* Transição para o zoom */
        }

        /* Zoom de leve na foto quando passa o mouse */
        .img-card:hover img {
            transform: scale(1.1);
        }

        /* A CAIXINHA DA DESCRIÇÃO DA FOTO */
        .img-desc {
            position: absolute;
            bottom: 0; /* Fica presa na parte de baixo da foto */
            left: 0;
            width: 100%;
            background: rgba(255, 20, 147, 0.85); /* Fundo rosa translúcido */
            color: white;
            padding: 0.62rem;
            box-sizing: border-box;
            text-align: center;
            font-family: "Comic Sans MS", cursive;
            font-size: 0.9rem;
            font-weight: bold;
            /* Começa escondida empurrada para baixo (100% da própria altura) */
            transform: translateY(100%); 
            transition: transform 0.3s ease-in-out;
        }

        /* Quando o mouse passa no card, o texto sobe (desliza)! */
        .img-card:hover .img-desc {
            transform: translateY(0);
        }

        /* ............................................................
           6. PAGINAÇÃO, RODAPÉ E ANIMAÇÕES
           ............................................................ */
        #pagination { margin-top: 1.25rem; display: flex; gap: 0.62rem; justify-content: center; }

        .active-page { 
            background-color: var(--pink-hot) !important; 
            box-shadow: 0px 0px 0px var(--pink-hot) !important;
            transform: translate(3px, 3px);
        }

        .footer-text {
            margin-top: 1.25rem;
            font-weight: bold;
            color: var(--pink-hot);
            text-align: center;
            animation: pulse 2s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <main class="window-container">
        <div class="window-title-bar">
            <span>✧ meu_diario.exe ✧</span>
            <span>[ X ]</span>
        </div>

        <header>
            <marquee scrollamount="6">💖 ⋆ 🎀 𝒷𝑒𝓂-𝓋𝒾𝓃𝒹𝓍𝓈 𝒶𝑜 𝓂𝑒𝓊 𝓂𝓊𝓃𝒹𝒾𝓃𝒽𝑜 🎀 ⋆ 💖</marquee>
            <h1>~* Galeria Y2K *~</h1>
        </header>

        <section class="controles">
            <input type="text" id="searchInput" placeholder="O que você tá procurando, bestie? 💅">
        </section>

        <section class="controles" id="filters">
            <button data-cat="all">Tudinho</button>
            <button data-cat="natureza">Natureza 🌸</button>
            <button data-cat="cidade">Cidade 🏙️</button>
            <button data-cat="animais">Bichinhos 🐶</button>
            <button data-cat="tecnologia">Tech 💻</button>
            <button data-cat="pessoas">Galera 👯‍♀️</button>
        </section>

        <section id="gallery"></section>
        <nav id="pagination"></nav>
        
        <p class="footer-text">Produzido por L.T</p>
    </main>

    <script src="js/model.js"></script>
    <script src="js/view.js"></script>
    <script src="js/controller.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
